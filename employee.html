<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MIKAN">
  <meta name="theme-color" content="#1a1a2e">
  <title>MIKAN - Employee</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--primary:#1a1a2e;--accent:#e94560;--accent2:#ff6b6b;--success:#10b981;--warning:#f59e0b;--danger:#ef4444;--surface:#16213e;--card:rgba(255,255,255,0.06);--card-solid:#1e2a45;--border:rgba(255,255,255,0.1);--text:#eee;--text-dim:#94a3b8;--radius:14px}
html{width:100%;min-height:100%;overflow-x:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(135deg,var(--primary) 0%,var(--surface) 50%,#0f3460 100%);min-height:100vh;padding:12px;color:var(--text)}
.container{max-width:500px;margin:0 auto}

/* Header */
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.header-left{display:flex;align-items:center;gap:10px}
.header-logo{font-size:32px}
.header-title h1{font-size:16px;font-weight:700;color:#fff}
.header-title p{font-size:11px;color:var(--text-dim)}
.header-actions{display:flex;gap:8px}
.btn-icon{width:44px;height:44px;border-radius:var(--radius);border:none;background:var(--card);color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;border:1px solid var(--border)}
.btn-icon:hover{background:rgba(255,255,255,0.12)}

/* Tabs */
.main-tabs{display:flex;gap:6px;margin-bottom:14px;background:var(--card);padding:5px;border-radius:16px;border:1px solid var(--border)}
.main-tab{flex:1;padding:12px;border:none;border-radius:12px;background:transparent;color:var(--text-dim);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px}
.main-tab:hover{color:#fff}
.main-tab.active{background:var(--accent);color:#fff;box-shadow:0 4px 15px rgba(233,69,96,0.3)}
.tab-badge{background:var(--danger);color:#fff;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700}
.tab-content{display:none}
.tab-content.active{display:block}

/* Cards */
.card{background:var(--card);backdrop-filter:blur(10px);border:1px solid var(--border);border-radius:20px;padding:20px;margin-bottom:12px}

/* Date Nav */
.date-nav{display:flex;align-items:center;justify-content:space-between;gap:8px}
.date-nav-btn{width:48px;height:48px;border-radius:var(--radius);border:1px solid var(--border);background:var(--card);font-size:22px;font-weight:700;color:#fff;cursor:pointer}
.date-nav-btn:disabled,.date-nav-btn.hidden{opacity:.2;pointer-events:none}
.date-center{flex:1;text-align:center;cursor:pointer}
.date-number{font-size:44px;font-weight:800;color:#fff;line-height:1}
.date-text{font-size:13px;color:var(--text-dim);margin-top:4px}
.date-badge{display:inline-block;background:var(--accent);color:#fff;padding:5px 14px;border-radius:20px;font-size:11px;font-weight:700;margin-top:8px;text-transform:uppercase}
.date-badge.closure{background:var(--warning);color:#000}
.date-hint{color:var(--text-dim);font-size:11px;margin-top:6px}

/* Closure notice */
.closure-notice{display:flex;align-items:center;gap:10px;background:rgba(245,158,11,0.15);border:1px solid rgba(245,158,11,0.3);padding:12px;border-radius:var(--radius);margin-bottom:14px}
.closure-notice .notice-icon{font-size:24px}
.closure-notice .notice-text strong{color:var(--warning);font-size:13px}
.closure-notice .notice-text span{color:var(--text-dim);font-size:11px;display:block;margin-top:2px}

/* Time Input */
.section-title{font-size:13px;font-weight:700;color:var(--text-dim);margin-bottom:10px;text-transform:uppercase;letter-spacing:1px}
.time-input{width:100%;padding:12px;font-size:28px;font-weight:700;text-align:center;border:2px solid var(--border);border-radius:var(--radius);color:#fff;background:rgba(255,255,255,0.05);-webkit-appearance:none}
.time-input:focus{outline:none;border-color:var(--accent)}
.time-input::-webkit-calendar-picker-indicator{filter:invert(1)}
.time-warning{display:none;color:var(--danger);font-size:12px;margin-top:6px;text-align:center;font-weight:600}
.time-warning.show{display:block}

/* Punch Button */
.punch-btn{width:100%;padding:16px;font-size:16px;font-weight:700;border:none;border-radius:var(--radius);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;margin-top:12px;transition:all .2s}
.punch-btn.in{background:linear-gradient(135deg,var(--success),#059669);color:#fff}
.punch-btn.out{background:linear-gradient(135deg,var(--warning),#d97706);color:#fff}
.punch-btn:disabled{opacity:.5}
.punch-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,0.3)}
.future-warning{background:rgba(239,68,68,0.15);color:var(--danger);padding:10px;border-radius:var(--radius);text-align:center;font-size:12px;font-weight:600;margin-top:12px}

/* Punch List */
.punches-header{display:flex;justify-content:space-between;align-items:center;margin:16px 0 10px}
.punches-count{background:rgba(255,255,255,0.1);padding:3px 10px;border-radius:var(--radius);font-size:12px;color:var(--text-dim)}
.punch-item{display:flex;align-items:center;justify-content:space-between;padding:12px;background:rgba(255,255,255,0.04);border-radius:12px;margin-bottom:8px;border-left:4px solid}
.punch-item.in{border-left-color:var(--success)}
.punch-item.out{border-left-color:var(--warning)}
.punch-item-left{display:flex;align-items:center;gap:10px}
.punch-type-badge{padding:4px 10px;border-radius:8px;font-size:11px;font-weight:700}
.punch-type-badge.in{background:rgba(16,185,129,0.2);color:#34d399}
.punch-type-badge.out{background:rgba(245,158,11,0.2);color:#fbbf24}
.punch-time{font-size:20px;font-weight:700;color:#fff}
.punch-actions{display:flex;gap:6px}
.punch-action-btn{width:36px;height:36px;border-radius:8px;border:none;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.punch-action-btn.edit{background:rgba(99,102,241,0.2);color:#818cf8}
.punch-action-btn.delete{background:rgba(239,68,68,0.2);color:#f87171}
.delete-confirm{display:none;position:absolute;right:8px;top:50%;transform:translateY(-50%);background:var(--card-solid);border:1px solid var(--border);border-radius:var(--radius);padding:6px;box-shadow:0 4px 20px rgba(0,0,0,.4);gap:6px;z-index:10}
.delete-confirm.show{display:flex}
.delete-confirm-btn{padding:8px 14px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer}
.delete-confirm-btn.yes{background:var(--danger);color:#fff}
.delete-confirm-btn.no{background:rgba(255,255,255,0.1);color:var(--text-dim)}

/* Hours Card */
.hours-card{background:linear-gradient(135deg,var(--accent),#c81e45);border-radius:var(--radius);padding:20px;text-align:center;margin-top:16px}
.hours-value{font-size:40px;font-weight:800;color:#fff}
.hours-label{font-size:11px;color:rgba(255,255,255,0.7);margin-top:4px;text-transform:uppercase}

/* Empty State */
.empty-state{text-align:center;padding:30px}
.empty-state-icon{font-size:40px;opacity:.4;margin-bottom:8px}
.empty-state-text{color:var(--text-dim);font-size:13px}

/* Holiday Summary */
.holiday-summary{background:linear-gradient(135deg,#e94560,#8b5cf6);border-radius:16px;padding:16px;margin-bottom:14px}
.holiday-summary-title{font-size:15px;font-weight:700;color:#fff;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.holiday-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.holiday-stat{background:rgba(255,255,255,0.15);border-radius:10px;padding:10px 6px;text-align:center}
.holiday-stat-value{font-size:18px;font-weight:700;color:#fff}
.holiday-stat-label{font-size:9px;color:rgba(255,255,255,0.8);margin-top:2px}

/* Holiday Form */
.form-label{display:block;font-weight:600;color:var(--text-dim);margin-bottom:8px;font-size:13px}
.form-input,.form-select,.form-textarea{width:100%;padding:12px;border:2px solid var(--border);border-radius:var(--radius);font-size:15px;background:rgba(255,255,255,0.05);color:#fff;font-family:inherit;-webkit-appearance:none}
.form-input:focus,.form-select:focus,.form-textarea:focus{outline:none;border-color:var(--accent)}
.form-input::-webkit-calendar-picker-indicator{filter:invert(1)}
.form-select option{background:var(--primary);color:#fff}
.form-textarea{resize:vertical;min-height:70px;font-size:13px}
.form-group{margin-bottom:14px}
.holiday-type-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.holiday-type-btn{padding:14px 8px;border:2px solid var(--border);border-radius:var(--radius);background:transparent;cursor:pointer;text-align:center;transition:all .2s;color:var(--text-dim)}
.holiday-type-btn:hover{border-color:rgba(255,255,255,0.2)}
.holiday-type-btn.selected{border-color:var(--accent);background:rgba(233,69,96,0.15);color:#fff}
.holiday-type-icon{font-size:22px;margin-bottom:4px}
.holiday-type-name{font-size:11px;font-weight:600}
.holiday-type-desc{font-size:9px;color:var(--text-dim);margin-top:2px}
.date-range-group{display:flex;gap:10px}
.date-field{flex:1}
.date-field-label{font-size:11px;color:var(--text-dim);margin-bottom:4px;font-weight:600}
.days-preview{background:rgba(233,69,96,0.15);border:1px solid rgba(233,69,96,0.3);border-radius:var(--radius);padding:12px;text-align:center;margin:12px 0}
.days-preview-value{font-size:28px;font-weight:700;color:var(--accent)}
.days-preview-label{font-size:11px;color:var(--text-dim)}
.submit-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--accent),#c81e45);color:#fff;border:none;border-radius:var(--radius);font-size:15px;font-weight:700;cursor:pointer;transition:all .2s}
.submit-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 6px 20px rgba(233,69,96,0.3)}
.submit-btn:disabled{opacity:.5}

/* Request List */
.request-item{background:rgba(255,255,255,0.04);border-radius:var(--radius);padding:12px;margin-bottom:8px;border-left:4px solid}
.request-item.Pending{border-left-color:var(--warning)}
.request-item.Approved{border-left-color:var(--success)}
.request-item.Rejected{border-left-color:var(--danger)}
.request-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.request-type{font-weight:700;color:#fff;font-size:13px}
.request-status{padding:3px 8px;border-radius:8px;font-size:10px;font-weight:600}
.request-status.Pending{background:rgba(245,158,11,0.2);color:#fbbf24}
.request-status.Approved{background:rgba(16,185,129,0.2);color:#34d399}
.request-status.Rejected{background:rgba(239,68,68,0.2);color:#f87171}
.request-dates{font-size:12px;color:var(--text-dim)}
.request-days{font-size:11px;color:var(--text-dim);margin-top:3px}

/* Calendar Overlay */
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);z-index:1000;display:none;align-items:center;justify-content:center;padding:12px}
.overlay.active{display:flex}
.calendar-modal{background:var(--card-solid);border:1px solid var(--border);border-radius:20px;width:100%;max-width:380px;padding:20px}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-header h3{color:#fff;font-size:16px}
.modal-close{width:36px;height:36px;border-radius:10px;border:none;background:rgba(255,255,255,0.1);color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.calendar-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.calendar-nav-btn{width:36px;height:36px;border:none;border-radius:8px;background:rgba(255,255,255,0.1);cursor:pointer;font-weight:700;font-size:16px;color:#fff;display:flex;align-items:center;justify-content:center}
.calendar-nav-btn:disabled{opacity:.3}
.calendar-month{font-size:15px;font-weight:700;color:#fff}
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.calendar-day-header{text-align:center;font-size:10px;font-weight:700;color:var(--text-dim);padding:6px 0}
.calendar-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:8px;font-weight:600;cursor:pointer;font-size:13px;color:var(--text-dim)}
.calendar-day.empty{cursor:default}
.calendar-day.future{opacity:.2;cursor:not-allowed}
.calendar-day.today{border:2px solid var(--accent)}
.calendar-day.selected{background:var(--accent);color:#fff}
.calendar-day.has-punches{background:rgba(233,69,96,0.3);color:#fff}
.calendar-day.selected.has-punches{background:var(--accent)}

/* Edit Modal */
.edit-modal{background:var(--card-solid);border:1px solid var(--border);border-radius:20px;width:100%;max-width:360px;padding:20px}
.edit-modal h3{color:#fff;font-size:15px;margin-bottom:14px}
.edit-time-input{width:100%;padding:14px;font-size:26px;font-weight:700;text-align:center;border:2px solid var(--border);border-radius:var(--radius);color:#fff;background:rgba(255,255,255,0.05);margin-bottom:14px;-webkit-appearance:none}
.edit-time-input:focus{outline:none;border-color:var(--accent)}
.edit-time-input::-webkit-calendar-picker-indicator{filter:invert(1)}
.edit-actions{display:flex;gap:8px}
.edit-btn{flex:1;padding:12px;border-radius:var(--radius);border:none;font-size:14px;font-weight:600;cursor:pointer}
.edit-btn.cancel{background:rgba(255,255,255,0.1);color:var(--text-dim)}
.edit-btn.save{background:var(--accent);color:#fff}

/* Toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(100px);padding:12px 24px;border-radius:var(--radius);font-weight:600;font-size:13px;z-index:2000;opacity:0;transition:all .3s;color:#fff}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.success{background:var(--success)}
.toast.error{background:var(--danger)}

/* Loading */
.loading{text-align:center;padding:40px}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{color:var(--text-dim);font-size:13px}

/* Success Banner */
.success-banner{background:rgba(16,185,129,0.15);border:1px solid rgba(16,185,129,0.3);border-radius:var(--radius);padding:14px;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.success-banner-icon{font-size:28px}
.success-banner-title{font-weight:700;color:#34d399;font-size:13px}
.success-banner-desc{color:var(--text-dim);font-size:11px;margin-top:2px}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-left">
      <div class="header-logo">🍊</div>
      <div class="header-title"><h1 id="userName">Employee</h1><p>MIKAN Time Clock</p></div>
    </div>
    <div class="header-actions">
      <button class="btn-icon" onclick="logout()" title="Log Out">🚪</button>
    </div>
  </div>

  <div class="main-tabs">
    <button class="main-tab active" onclick="switchTab('hours')" id="tabHours"><span>⏱️</span> Clock</button>
    <button class="main-tab" onclick="switchTab('holidays')" id="tabHolidays"><span>🏖️</span> Time Off <span class="tab-badge" id="pendingBadge" style="display:none">0</span></button>
  </div>

  <div id="hoursTab" class="tab-content active">
    <div id="content"><div class="loading"><div class="spinner"></div><p>Loading...</p></div></div>
  </div>

  <div id="holidaysTab" class="tab-content">
    <div id="holidayContent"><div class="loading"><div class="spinner"></div><p>Loading...</p></div></div>
  </div>
</div>

<!-- Calendar Overlay -->
<div class="overlay" id="calendarOverlay" onclick="closeOverlay(event,'calendar')">
  <div class="calendar-modal" onclick="event.stopPropagation()">
    <div class="modal-header"><h3>📅 Pick a Date</h3><button class="modal-close" onclick="closeOverlay(null,'calendar')">✕</button></div>
    <div class="calendar-nav">
      <button class="calendar-nav-btn" onclick="calChangeMonth(-1)">‹</button>
      <span class="calendar-month" id="calendarMonth"></span>
      <button class="calendar-nav-btn" id="nextMonthBtn" onclick="calChangeMonth(1)">›</button>
    </div>
    <div class="calendar-grid" id="calendarGrid"></div>
  </div>
</div>

<!-- Edit Overlay -->
<div class="overlay" id="editOverlay" onclick="closeOverlay(event,'edit')">
  <div class="edit-modal" onclick="event.stopPropagation()">
    <h3>✏️ Edit Punch</h3>
    <input type="time" class="edit-time-input" id="editTimeInput">
    <div class="edit-actions">
      <button class="edit-btn cancel" onclick="closeOverlay(null,'edit')">Cancel</button>
      <button class="edit-btn save" onclick="saveEdit()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbzNRsp18lbCt5rJrDFXHCZWCwRvBepq39lP-rmURbHxxWM0qwnFvXAnWp3V9eUZJX0y/exec';

// Auth check
const USER = JSON.parse(sessionStorage.getItem('mikan_user') || 'null');
if (!USER) window.location.href = 'index.html';
else document.getElementById('userName').textContent = USER.name;

const HOLIDAY_TYPES = {
  Annual: { name: 'Vacation', emoji: '🏖️' },
  Personal: { name: 'Personal Day', emoji: '👤' },
  Medical: { name: 'Sick Leave', emoji: '🏥' }
};

// State
const S = {
  currentDate: new Date(),
  calendarDate: new Date(),
  punchedDays: {},
  closures: {},
  editingPunchId: null,
  selectedHolidayType: null,
  holidaySummary: null,
  holidayLoaded: false,
  isPunching: false,
  currentTab: 'hours'
};

// Utilities
const U = {
  formatDate: d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`,
  getCurrentTime: () => { const n=new Date(); return `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`; },
  isToday: d => { const t=new Date(); return d.getFullYear()===t.getFullYear()&&d.getMonth()===t.getMonth()&&d.getDate()===t.getDate(); },
  isFuture: d => { const t=new Date(); t.setHours(0,0,0,0); const c=new Date(d); c.setHours(0,0,0,0); return c>t; },
  isTimeFuture: t => { if(!U.isToday(S.currentDate))return false; const n=new Date(),cm=n.getHours()*60+n.getMinutes(),[h,m]=t.split(':').map(Number); return h*60+m>cm; },
  calcHours: punches => { if(!punches?.length)return 0; let mins=0; const s=[...punches].sort((a,b)=>a.time.localeCompare(b.time)); for(let i=0;i<s.length-1;i+=2) if(s[i].punchType==='IN'&&s[i+1]?.punchType==='OUT'){const[ih,im]=s[i].time.split(':').map(Number),[oh,om]=s[i+1].time.split(':').map(Number);const d=(oh*60+om)-(ih*60+im);if(d>0)mins+=d;} return mins/60; },
  esc: t => { if(!t)return''; const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }
};

const $=id=>document.getElementById(id);
const showToast=(msg,type='')=>{const t=$('toast');t.textContent=msg;t.className=`toast ${type} show`;setTimeout(()=>t.classList.remove('show'),3000)};

async function api(params) {
  const url = new URL(API_URL);
  Object.entries(params).forEach(([k,v]) => url.searchParams.set(k, v));
  const res = await fetch(url.toString());
  return res.json();
}

async function apiPost(data) {
  const res = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(data)
  });
  return res.json();
}

function logout() {
  sessionStorage.removeItem('mikan_user');
  window.location.href = 'index.html';
}

// Tab switching
function switchTab(tab) {
  S.currentTab = tab;
  $('tabHours').classList.toggle('active', tab==='hours');
  $('tabHolidays').classList.toggle('active', tab==='holidays');
  $('hoursTab').classList.toggle('active', tab==='hours');
  $('holidaysTab').classList.toggle('active', tab==='holidays');
  if (tab==='holidays' && !S.holidayLoaded) loadHolidayData();
}

// Overlays
function openOverlay(type) {
  $(`${type}Overlay`).classList.add('active');
  if (type==='calendar') { S.calendarDate=new Date(S.currentDate); loadCalendarMonth(); }
}
function closeOverlay(e, type) {
  if (e && e.target !== e.currentTarget) return;
  $(`${type}Overlay`).classList.remove('active');
}

// ========== CLOCK TAB ==========
async function loadDayData() {
  const ds = U.formatDate(S.currentDate);
  displayLoading();
  try {
    const data = await apiPost({ action:'getDayData', employee:USER.id, date:ds });
    if (data.success) {
      if (data.closure) S.closures[ds] = data.closure;
      displayDay(data.punches || []);
    } else displayDay([]);
  } catch(e) { showToast('Error loading data','error'); displayDay([]); }
}

function displayLoading() {
  const isT=U.isToday(S.currentDate), wd=S.currentDate.toLocaleDateString('en-US',{weekday:'long'}), md=S.currentDate.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  $('content').innerHTML=`<div class="card"><div class="date-nav"><button class="date-nav-btn" onclick="changeDay(-1)">‹</button><div class="date-center" onclick="openOverlay('calendar')"><div class="date-number">${S.currentDate.getDate()}</div><div class="date-text">${wd}, ${md}</div>${isT?'<div class="date-badge">TODAY</div>':''}</div><button class="date-nav-btn ${isT?'hidden':''}" onclick="changeDay(1)" ${isT?'disabled':''}>›</button></div></div><div class="card"><div class="loading"><div class="spinner"></div><p>Loading...</p></div></div>`;
}

function displayDay(punches) {
  const isT=U.isToday(S.currentDate), isF=U.isFuture(S.currentDate), ds=U.formatDate(S.currentDate);
  const nextType = punches.length%2===0 ? 'IN' : 'OUT';
  const hrs = U.calcHours(punches);
  const wd=S.currentDate.toLocaleDateString('en-US',{weekday:'long'}), md=S.currentDate.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  const closure = S.closures[ds];

  let badge = isT ? '<div class="date-badge">TODAY</div>' : closure ? `<div class="date-badge closure">🔒 ${U.esc(closure)}</div>` : '<div class="date-hint">📅 Tap to pick date</div>';

  let html = `<div class="card"><div class="date-nav"><button class="date-nav-btn" onclick="changeDay(-1)">‹</button><div class="date-center" onclick="openOverlay('calendar')"><div class="date-number">${S.currentDate.getDate()}</div><div class="date-text">${wd}, ${md}</div>${badge}</div><button class="date-nav-btn ${isT?'hidden':''}" onclick="changeDay(1)" ${isT?'disabled':''}>›</button></div></div>`;

  html += '<div class="card">';
  if (closure) html += `<div class="closure-notice"><div class="notice-icon">🔒</div><div class="notice-text"><strong>Closed</strong><span>${U.esc(closure)}</span></div></div>`;

  const canPunch = !isF;
  const label = nextType==='IN' ? 'CLOCK IN' : 'CLOCK OUT';

  html += `<div class="section-title">⏱️ Record Time</div>
    <input type="time" class="time-input" id="punchTime" value="${U.getCurrentTime()}" onchange="validateTime(this)" ${!canPunch?'disabled':''}>
    <div class="time-warning" id="timeWarning">⚠️ Cannot select a future time</div>
    <button class="punch-btn ${nextType.toLowerCase()}" onclick="doPunch()" ${!canPunch?'disabled':''}><span>${nextType==='IN'?'🟢':'🟠'}</span> ${label}</button>`;

  if (isF) html += '<div class="future-warning">⚠️ Cannot punch in future dates</div>';

  // Punch list
  html += `<div class="punches-header"><div class="section-title" style="margin:0">📋 Punches</div><div class="punches-count">${punches.length}</div></div>`;

  if (!punches.length) {
    html += '<div class="empty-state"><div class="empty-state-icon">🕐</div><div class="empty-state-text">No punches yet</div></div>';
  } else {
    punches.forEach(p => {
      const lbl = p.punchType==='IN' ? 'IN' : 'OUT';
      html += `<div class="punch-item ${p.punchType.toLowerCase()}" id="punch-${p.punchId}" style="position:relative">
        <div class="punch-item-left"><span class="punch-type-badge ${p.punchType.toLowerCase()}">${lbl}</span><span class="punch-time">${p.time}</span></div>
        <div class="punch-actions" id="actions-${p.punchId}">
          <button class="punch-action-btn edit" onclick="openEdit('${p.punchId}','${p.time}')">✏️</button>
          <button class="punch-action-btn delete" onclick="showDelete('${p.punchId}')">🗑️</button>
        </div>
        <div class="delete-confirm" id="confirm-${p.punchId}">
          <button class="delete-confirm-btn yes" onclick="confirmDelete('${p.punchId}')">Delete</button>
          <button class="delete-confirm-btn no" onclick="cancelDelete('${p.punchId}')">Cancel</button>
        </div>
      </div>`;
    });
  }

  html += `<div class="hours-card"><div class="hours-value">${hrs.toFixed(2)}h</div><div class="hours-label">Total Hours</div></div></div>`;
  $('content').innerHTML = html;
}

function changeDay(dir) {
  if (dir>0 && U.isToday(S.currentDate)) return;
  S.currentDate.setDate(S.currentDate.getDate()+dir);
  loadDayData();
}

function validateTime(input) {
  const future = U.isTimeFuture(input.value);
  input.style.borderColor = future ? '#ef4444' : 'rgba(255,255,255,0.1)';
  const btn = document.querySelector('.punch-btn');
  if (btn) btn.disabled = future;
  const warn = $('timeWarning');
  if (warn) warn.classList.toggle('show', future);
}

async function doPunch() {
  if (S.isPunching) return;
  S.isPunching = true;
  const time = $('punchTime').value, ds = U.formatDate(S.currentDate);
  if (!time) { S.isPunching=false; return showToast('Please select a time','error'); }
  if (U.isFuture(S.currentDate)) { S.isPunching=false; return showToast('Cannot punch future dates','error'); }
  if (U.isTimeFuture(time)) { S.isPunching=false; return showToast('Cannot punch future time','error'); }

  const btn = document.querySelector('.punch-btn');
  btn.disabled=true; btn.innerHTML='<span>⏳</span> Saving...';

  try {
    const r = await apiPost({ action:'addPunch', employee:USER.id, name:USER.name, date:ds, time });
    S.isPunching = false;
    if (r.success) { showToast(r.message,'success'); loadDayData(); }
    else { showToast(r.message,'error'); btn.disabled=false; }
  } catch(e) { S.isPunching=false; showToast('Error saving punch','error'); btn.disabled=false; }
}

// Delete
function showDelete(id) {
  document.querySelectorAll('.delete-confirm.show').forEach(e=>e.classList.remove('show'));
  $(`confirm-${id}`).classList.add('show');
  $(`actions-${id}`).style.display='none';
}
function cancelDelete(id) {
  $(`confirm-${id}`).classList.remove('show');
  $(`actions-${id}`).style.display='flex';
}
async function confirmDelete(id) {
  try {
    const r = await apiPost({ action:'deletePunch', punchId:id, employee:USER.id });
    if (r.success) { showToast('Punch deleted','success'); loadDayData(); }
    else showToast(r.message,'error');
  } catch(e) { showToast('Error','error'); }
}

// Edit
function openEdit(id, time) { S.editingPunchId=id; $('editTimeInput').value=time; openOverlay('edit'); }
async function saveEdit() {
  const time = $('editTimeInput').value;
  if (!time) return showToast('Select a time','error');
  try {
    const r = await apiPost({ action:'editPunch', punchId:S.editingPunchId, time, employee:USER.id });
    if (r.success) { showToast('Punch updated','success'); closeOverlay(null,'edit'); loadDayData(); }
    else showToast(r.message,'error');
  } catch(e) { showToast('Error','error'); }
}

// ========== CALENDAR ==========
async function loadCalendarMonth() {
  const y=S.calendarDate.getFullYear(), m=S.calendarDate.getMonth()+1;
  $('calendarMonth').textContent = S.calendarDate.toLocaleDateString('en-US',{month:'long',year:'numeric'});
  const next=new Date(y,m,1), today=new Date();
  $('nextMonthBtn').disabled = next>new Date(today.getFullYear(),today.getMonth()+1,0);

  $('calendarGrid').innerHTML='<div style="grid-column:span 7;text-align:center;padding:20px"><div class="spinner" style="margin:0 auto 8px;width:24px;height:24px"></div></div>';

  try {
    const r = await apiPost({ action:'getPunchedDays', employee:USER.id, year:String(y), month:String(m) });
    S.punchedDays = r.success ? r.days : {};
  } catch(e) { S.punchedDays = {}; }
  renderCalendar();
}

function renderCalendar() {
  const y=S.calendarDate.getFullYear(), m=S.calendarDate.getMonth(), first=new Date(y,m,1), last=new Date(y,m+1,0), start=first.getDay();
  const todayStr=U.formatDate(new Date()), selStr=U.formatDate(S.currentDate);
  let html='';
  ['S','M','T','W','T','F','S'].forEach(n=>html+=`<div class="calendar-day-header">${n}</div>`);
  for(let i=0;i<start;i++) html+='<div class="calendar-day empty"></div>';
  for(let d=1;d<=last.getDate();d++){
    const date=new Date(y,m,d), ds=U.formatDate(date), isF=U.isFuture(date);
    const hasP=S.punchedDays[ds]?.count>0;
    let cls=['calendar-day'];
    if(ds===todayStr)cls.push('today');
    if(ds===selStr)cls.push('selected');
    if(isF)cls.push('future');
    else if(hasP)cls.push('has-punches');
    html+=`<div class="${cls.join(' ')}" ${isF?'':`onclick="selectDate(${y},${m},${d})"`}>${d}</div>`;
  }
  $('calendarGrid').innerHTML=html;
}

function selectDate(y,m,d) { S.currentDate=new Date(y,m,d); closeOverlay(null,'calendar'); loadDayData(); }
function calChangeMonth(dir) {
  if(dir>0){const next=new Date(S.calendarDate.getFullYear(),S.calendarDate.getMonth()+1,1),today=new Date();if(next>new Date(today.getFullYear(),today.getMonth()+1,0))return;}
  S.calendarDate.setMonth(S.calendarDate.getMonth()+dir); loadCalendarMonth();
}

// ========== HOLIDAYS TAB ==========
async function loadHolidayData() {
  $('holidayContent').innerHTML='<div class="loading"><div class="spinner"></div><p>Loading...</p></div>';
  try {
    const r = await apiPost({ action:'getHolidaySummary', employee:USER.id });
    S.holidaySummary = r.success ? r : null;
    S.holidayLoaded = true;
    displayHolidayTab();
    updateBadge();
  } catch(e) { S.holidayLoaded=true; displayHolidayTab(); }
}

function updateBadge() {
  const s=S.holidaySummary; if(!s)return;
  const p=(s.annualPending||0)+(s.personalPending||0)+(s.medicalPending||0);
  const b=$('pendingBadge');
  if(p>0){b.textContent=p;b.style.display='inline';}else b.style.display='none';
}

function displayHolidayTab(showSuccess) {
  const s = S.holidaySummary || { annualTotal:22,annualUsed:0,annualPending:0,annualRemaining:22,personalTotal:3,personalUsed:0,personalPending:0,personalRemaining:3,medicalUsed:0,medicalPending:0,requests:[] };
  const today = new Date().toISOString().split('T')[0];
  const pending = (s.annualPending||0)+(s.personalPending||0)+(s.medicalPending||0);

  let html = '';
  if (showSuccess) {
    html += `<div class="success-banner"><div class="success-banner-icon">✅</div><div><div class="success-banner-title">Request Submitted!</div><div class="success-banner-desc">Your request is pending approval</div></div></div>`;
  }

  // Summary
  html += `<div class="holiday-summary">
    <div class="holiday-summary-title">📊 Your Balance ${pending?`<span class="tab-badge">${pending} pending</span>`:''}</div>
    <div class="holiday-stats">
      <div class="holiday-stat"><div class="holiday-stat-value">${s.annualUsed}/${s.annualTotal}</div><div class="holiday-stat-label">Vacation</div></div>
      <div class="holiday-stat"><div class="holiday-stat-value">${s.personalUsed}/${s.personalTotal}</div><div class="holiday-stat-label">Personal</div></div>
      <div class="holiday-stat"><div class="holiday-stat-value">${s.medicalUsed}</div><div class="holiday-stat-label">Sick Days</div></div>
    </div>
  </div>`;

  // Request Form
  html += `<div class="card">
    <div class="section-title">📝 New Request</div>
    <div class="form-group">
      <label class="form-label">Type</label>
      <div class="holiday-type-grid">
        <div class="holiday-type-btn" onclick="selectType('Annual')" id="type-Annual"><div class="holiday-type-icon">🏖️</div><div class="holiday-type-name">Vacation</div><div class="holiday-type-desc">${s.annualRemaining} days left</div></div>
        <div class="holiday-type-btn" onclick="selectType('Personal')" id="type-Personal"><div class="holiday-type-icon">👤</div><div class="holiday-type-name">Personal</div><div class="holiday-type-desc">${s.personalRemaining} days left</div></div>
        <div class="holiday-type-btn" onclick="selectType('Medical')" id="type-Medical"><div class="holiday-type-icon">🏥</div><div class="holiday-type-name">Sick Leave</div><div class="holiday-type-desc">No limit</div></div>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Dates</label>
      <div class="date-range-group">
        <div class="date-field"><div class="date-field-label">From</div><input type="date" class="form-input" id="holidayStart" min="${today}" onchange="onStartChange()"></div>
        <div class="date-field"><div class="date-field-label">To</div><input type="date" class="form-input" id="holidayEnd" min="${today}" onchange="updatePreview()"></div>
      </div>
    </div>
    <div id="daysPreview" style="display:none"><div class="days-preview"><div class="days-preview-value" id="previewValue">0</div><div class="days-preview-label">Days requested</div></div></div>
    <div class="form-group"><label class="form-label">Reason (optional)</label><textarea class="form-textarea" id="holidayReason" placeholder="e.g., Family vacation, doctor visit..."></textarea></div>
    <button class="submit-btn" onclick="submitHoliday()" id="submitBtn">📤 Submit Request</button>
  </div>`;

  // Request history
  const reqs = (s.requests||[]).filter(r=>r.status==='Pending'||r.status==='Approved').sort((a,b)=>new Date(b.requestDate)-new Date(a.requestDate)).slice(0,10);
  html += '<div class="card"><div class="section-title">📋 My Requests</div>';
  if (reqs.length) {
    reqs.forEach(r => {
      const statusLabel = {Pending:'Pending',Approved:'Approved',Rejected:'Rejected'}[r.status]||r.status;
      const typeName = HOLIDAY_TYPES[r.type]?.name||r.type;
      const emoji = HOLIDAY_TYPES[r.type]?.emoji||'📅';
      html += `<div class="request-item ${r.status}">
        <div class="request-header"><span class="request-type">${emoji} ${typeName}</span><span class="request-status ${r.status}">${statusLabel}</span></div>
        <div class="request-dates">${new Date(r.startDate).toLocaleDateString('en-US')}${r.startDate!==r.endDate?' - '+new Date(r.endDate).toLocaleDateString('en-US'):''}</div>
        <div class="request-days">${r.days} day${r.days!==1?'s':''}${r.reason?' • '+U.esc(r.reason.substring(0,50))+(r.reason.length>50?'...':''):''}</div>
      </div>`;
    });
  } else {
    html += '<div class="empty-state"><div class="empty-state-icon">📝</div><div class="empty-state-text">No requests yet</div></div>';
  }
  html += '</div>';
  $('holidayContent').innerHTML = html;
  S.selectedHolidayType = null;
}

function selectType(type) {
  S.selectedHolidayType = type;
  document.querySelectorAll('.holiday-type-btn').forEach(b=>b.className='holiday-type-btn');
  $(`type-${type}`).classList.add('selected');
}

function onStartChange() {
  const start=$('holidayStart').value, end=$('holidayEnd');
  end.min=start;
  if(end.value<start) end.value=start;
  updatePreview();
}

function updatePreview() {
  const start=$('holidayStart').value, end=$('holidayEnd').value, container=$('daysPreview');
  if(!start||!end||end<start){container.style.display='none';return;}
  const days = Math.floor((new Date(end)-new Date(start))/(24*60*60*1000))+1;
  container.style.display='block';
  $('previewValue').textContent=days;
}

async function submitHoliday() {
  if(!S.selectedHolidayType) return showToast('Please select a type','error');
  const start=$('holidayStart').value, end=$('holidayEnd').value, reason=$('holidayReason').value;
  if(!start||!end) return showToast('Please select dates','error');
  if(end<start) return showToast('End date must be after start','error');

  const btn=$('submitBtn');
  btn.disabled=true; btn.textContent='⏳ Submitting...';

  try {
    const r = await apiPost({ action:'submitHoliday', employee:USER.id, name:USER.name, type:S.selectedHolidayType, startDate:start, endDate:end, reason });
    if(r.success) { await loadHolidayData(); displayHolidayTab(true); showToast(`Request submitted (${r.totalDays} day${r.totalDays!==1?'s':''})`,'success'); }
    else { showToast(r.message,'error'); btn.disabled=false; btn.textContent='📤 Submit Request'; }
  } catch(e) { showToast('Error submitting','error'); btn.disabled=false; btn.textContent='📤 Submit Request'; }
}

// Init
window.onload = () => {
  if (!USER) return;
  // Load closures
  apiPost({ action:'getClosures' }).then(r => {
    if(r.success)(r.closures||[]).forEach(c=>{
      const start=new Date(c.startDate),end=new Date(c.endDate);
      for(let d=new Date(start);d<=end;d.setDate(d.getDate()+1)) S.closures[U.formatDate(d)]=c.name;
    });
  }).catch(()=>{});
  // Load holiday summary for badge
  apiPost({ action:'getHolidaySummary', employee:USER.id }).then(r=>{if(r.success){S.holidaySummary=r;updateBadge();}}).catch(()=>{});
  loadDayData();
};
</script>
</body>
</html>
