<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#e9b595">
  <title>MIKAN - Admin</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f1dfd3;--accent:#e9b595;--accent-dark:#d4956e;--success:#10b981;--warning:#f59e0b;--danger:#ef4444;--border:#e0d0c4;--text:#1a1a1a;--text-dim:#6b5c52;--radius:14px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:260px;background:#fff;padding:20px;overflow-y:auto;z-index:100;border-right:1px solid var(--border);box-shadow:2px 0 10px rgba(0,0,0,0.04)}
.sidebar-header{display:flex;align-items:center;gap:12px;margin-bottom:28px;padding-bottom:18px;border-bottom:1px solid var(--border)}
.sidebar-logo img{width:40px;height:40px;object-fit:contain}
.sidebar-title h1{font-size:16px;font-weight:700}.sidebar-title p{font-size:11px;color:var(--text-dim)}
.nav-item{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:var(--radius);cursor:pointer;transition:all .2s;margin-bottom:4px;color:var(--text-dim);font-size:14px}
.nav-item:hover{background:var(--accent);color:var(--text)}
.nav-item.active{background:var(--accent-dark);color:#fff;font-weight:600}
.nav-icon{font-size:18px}
.nav-badge{margin-left:auto;background:var(--danger);color:#fff;padding:2px 7px;border-radius:8px;font-size:10px;font-weight:700}
.sidebar-footer{position:absolute;bottom:20px;left:20px;right:20px}
.admin-info{background:var(--bg);border-radius:var(--radius);padding:12px;margin-bottom:10px}
.admin-name{font-weight:600;font-size:13px}.admin-role{font-size:11px;color:var(--text-dim)}
.logout-btn{width:100%;padding:10px;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text-dim);cursor:pointer;font-weight:600;font-size:13px}
.logout-btn:hover{background:var(--accent);color:var(--text)}
.main{margin-left:260px;padding:24px;min-height:100vh}
.page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.page-title{font-size:22px;font-weight:700}.page-subtitle{color:var(--text-dim);font-size:12px;margin-top:2px}
.btn{padding:8px 16px;border:none;border-radius:10px;cursor:pointer;font-weight:600;font-size:13px;transition:all .2s;display:inline-flex;align-items:center;gap:6px;color:#fff}
.btn-primary{background:var(--accent-dark)}.btn-primary:hover{background:#c07a50}
.btn-add{background:rgba(212,149,110,0.15);color:var(--accent-dark);border:1px solid var(--accent)}.btn-add:hover{background:rgba(212,149,110,0.25)}
.btn-success{background:var(--success)}.btn-danger{background:var(--danger)}
.btn-sm{padding:5px 10px;font-size:11px;border:none;border-radius:6px;cursor:pointer;font-weight:600;color:#fff}
.btn:disabled,.btn-sm:disabled{opacity:.5;cursor:not-allowed}
/* Tabs */
.tabs{display:flex;gap:4px;margin-bottom:16px;padding:4px;background:#fff;border-radius:12px;border:1px solid var(--border);flex-wrap:wrap}
.tab{padding:8px 16px;border:none;border-radius:8px;background:transparent;color:var(--text-dim);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s}
.tab:hover{color:var(--text)}.tab.active{background:var(--accent-dark);color:#fff;font-weight:600}
.tab-badge{background:var(--danger);color:#fff;padding:1px 6px;border-radius:6px;font-size:10px;font-weight:700;margin-left:4px}
.tab.active .tab-badge{background:rgba(255,255,255,0.3)}
.tab-content{display:none}.tab-content.active{display:block}
/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:16px;box-shadow:0 2px 6px rgba(0,0,0,0.03)}
.stat-icon{font-size:24px;margin-bottom:8px}.stat-value{font-size:24px;font-weight:700}.stat-label{font-size:11px;color:var(--text-dim);margin-top:2px}
/* Card & Table */
.card{background:#fff;border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:14px;box-shadow:0 2px 6px rgba(0,0,0,0.03)}
.card-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.card-title{font-size:15px;font-weight:700}.card-body{padding:16px}
table{width:100%;border-collapse:collapse}
th{padding:10px 14px;text-align:left;font-weight:600;color:#fff;font-size:11px;text-transform:uppercase;background:var(--accent)}
td{padding:12px 14px;border-bottom:1px solid var(--border);font-size:13px}
tbody tr{transition:all .15s}tbody tr:hover{background:rgba(233,181,149,0.2)}
.emp-name{font-weight:600}.emp-role{font-size:11px;color:var(--text-dim)}
</style>
</head>
<body>
<button class="mobile-menu-btn" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
<div class="sidebar" id="sidebar">
  <div class="sidebar-header"><div class="sidebar-logo"><img src="logo.png" alt="MIKAN" style="width:40px;height:40px;object-fit:contain"></div><div class="sidebar-title"><h1>MIKAN</h1><p>Admin Panel</p></div></div>
  <nav>
    <div class="nav-item active" onclick="showSection('hours')" id="navHours"><span class="nav-icon">📊</span>Employee Hours</div>
    <div class="nav-item" onclick="showSection('timeoff')" id="navTimeoff"><span class="nav-icon">🏖️</span>Time Off<span class="nav-badge" id="pendingBadge" style="display:none">0</span></div>
    <div class="nav-item" onclick="showSection('archive')" id="navArchive"><span class="nav-icon">📦</span>Annual Archive</div>
  </nav>
  <div class="sidebar-footer"><div class="admin-info"><div class="admin-name" id="adminName">Admin</div><div class="admin-role">Administrator</div></div><button class="logout-btn" onclick="logout()">🚪 Log Out</button></div>
</div>
<div class="main" id="mainContent"></div>
</body>
</html>

<style>
.badge{display:inline-block;padding:3px 10px;border-radius:8px;font-size:11px;font-weight:600}
.badge-good{background:#d1fae5;color:#065f46}.badge-warn{background:#fef3c7;color:#92400e}.badge-bad{background:#fee2e2;color:#991b1b}
.badge-active{background:#d1fae5;color:#065f46}.badge-inactive{background:#fee2e2;color:#991b1b}
.badge-annual{background:#dbeafe;color:#1e40af}.badge-personal{background:#ede9fe;color:#5b21b6}.badge-medical{background:#fee2e2;color:#991b1b}.badge-medappt{background:#fef3c7;color:#92400e}
.badge-pending{background:#fef3c7;color:#92400e}.badge-approved{background:#d1fae5;color:#065f46}.badge-rejected{background:#fee2e2;color:#991b1b}
.pin-badge{background:var(--bg);padding:3px 8px;border-radius:6px;font-family:monospace;font-size:12px;color:var(--text-dim)}
.month-sel{display:flex;align-items:center;gap:6px;background:#fff;padding:4px;border-radius:var(--radius);border:1px solid var(--border)}
.month-btn{width:32px;height:32px;border:none;border-radius:8px;background:var(--bg);cursor:pointer;font-size:14px;font-weight:700;color:var(--text);display:flex;align-items:center;justify-content:center}
.month-btn:hover{background:var(--accent)}.month-btn:disabled{opacity:.3;cursor:not-allowed}
.month-lbl{min-width:130px;text-align:center;font-weight:700;font-size:13px}
.month-cur{background:var(--accent-dark);color:#fff;padding:1px 6px;border-radius:6px;font-size:9px;font-weight:700;margin-left:4px}
.search-input{padding:7px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;width:180px}
.search-input:focus{outline:none;border-color:var(--accent-dark)}
/* Modal */
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);display:none;align-items:center;justify-content:center;z-index:1000;padding:16px}
.modal-bg.active{display:flex}
.modal{background:#fff;border:1px solid var(--border);border-radius:16px;width:90%;max-width:480px;max-height:90vh;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.15)}
.modal-lg{max-width:800px}
.modal-hd{background:linear-gradient(135deg,var(--accent-dark),#c07a50);padding:14px 18px;display:flex;justify-content:space-between;align-items:center}
.modal-hd h2{font-size:15px;color:#fff}
.modal-x{width:32px;height:32px;border-radius:8px;border:none;background:rgba(255,255,255,0.25);color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal-bd{padding:16px;max-height:calc(90vh - 60px);overflow-y:auto}
.fg{margin-bottom:12px}.fl{display:block;font-weight:600;color:var(--text-dim);margin-bottom:4px;font-size:12px}
.fi,.fs{width:100%;padding:8px 10px;border:2px solid var(--border);border-radius:8px;font-size:13px;background:#fff;color:var(--text);font-family:inherit}
.fi:focus,.fs:focus{outline:none;border-color:var(--accent-dark)}
.fs option{background:#fff;color:var(--text)}
.btn-row{display:flex;gap:8px;margin-top:16px}
.btn-save{flex:1;padding:10px;background:var(--accent-dark);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}.btn-save:disabled{opacity:.5}
.btn-cancel{flex:1;padding:10px;background:var(--bg);color:var(--text-dim);border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
/* Closure */
.closure-item{display:flex;justify-content:space-between;align-items:center;padding:12px;background:#fef3c7;border:1px solid #fde68a;border-radius:10px;margin-bottom:6px}
.closure-name{font-weight:600;color:#92400e;font-size:13px}.closure-dates{font-size:11px;color:#b45309;margin-top:1px}
.closure-del{width:28px;height:28px;border-radius:6px;border:none;background:#fee2e2;color:#991b1b;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center}
/* Paid hours */
.paid-item{display:flex;justify-content:space-between;align-items:center;padding:12px;background:#d1fae5;border-left:3px solid var(--success);border-radius:10px;margin-bottom:6px}
.paid-info .paid-name{font-weight:600;color:#065f46;font-size:13px}.paid-info .paid-detail{font-size:11px;color:#047857}
.paid-hrs{font-size:18px;font-weight:700;color:#065f46;margin-right:10px}
/* Calendar */
.cal-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.cal-title{font-size:16px;font-weight:700}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.cal-hdr{text-align:center;font-size:10px;font-weight:700;color:var(--text-dim);padding:6px}
.cal-cell{aspect-ratio:1.2;border:2px solid var(--border);border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;background:#fff;font-size:13px}
.cal-cell:hover:not(.empty){border-color:var(--accent-dark);background:rgba(233,181,149,0.15)}
.cal-cell.empty{border:none;cursor:default;background:transparent}
.cal-cell.today{border-color:var(--accent-dark);box-shadow:0 0 0 2px rgba(212,149,110,0.3)}
.cal-cell.has-data{background:var(--accent);border-color:var(--accent)}
.cal-day{font-weight:700}.cal-sub{font-size:9px;color:var(--text-dim);margin-top:1px}
.cal-cell.has-data .cal-sub{color:var(--text)}
/* Day detail */
.day-hrs{background:linear-gradient(135deg,var(--accent-dark),#c07a50);color:#fff;padding:16px;border-radius:var(--radius);text-align:center;margin-bottom:14px}
.day-hrs-val{font-size:32px;font-weight:700}.day-hrs-lbl{font-size:12px;opacity:.8;margin-top:4px}
.day-punch{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--bg);border-radius:10px;margin-bottom:6px;border-left:3px solid}
.day-punch.in{border-color:var(--success)}.day-punch.out{border-color:var(--warning)}
.punch-type{padding:3px 10px;border-radius:8px;font-size:10px;font-weight:700}
.punch-type.in{background:#d1fae5;color:#065f46}.punch-type.out{background:#fef3c7;color:#92400e}
.punch-time-lg{font-size:18px;font-weight:700}
/* Empty & Loading */
.empty{text-align:center;padding:30px;color:var(--text-dim)}.empty-icon{font-size:40px;opacity:.4;margin-bottom:8px}
.loading{text-align:center;padding:30px}.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(100px);padding:10px 20px;border-radius:var(--radius);font-weight:600;font-size:12px;z-index:2000;opacity:0;transition:all .3s;color:#fff}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}.toast.success{background:var(--success)}.toast.error{background:var(--danger)}
.mobile-menu-btn{display:none;position:fixed;top:16px;left:16px;width:44px;height:44px;border-radius:var(--radius);border:none;background:var(--accent-dark);color:#fff;font-size:20px;cursor:pointer;z-index:200;align-items:center;justify-content:center}
@media(max-width:768px){.sidebar{transform:translateX(-100%);transition:transform .3s}.sidebar.open{transform:translateX(0)}.mobile-menu-btn{display:flex}.main{margin-left:0;padding:14px;padding-top:70px}.stats-grid{grid-template-columns:repeat(2,1fr)}table{display:block;overflow-x:auto}.cal-cell{font-size:11px}}
</style>
<div class="modal-bg" id="modalBg"><div class="modal" id="modal"><div class="modal-hd"><h2 id="mTitle"></h2><button class="modal-x" onclick="closeModal()">✕</button></div><div class="modal-bd" id="mBody"></div></div></div>
<div class="toast" id="toast"></div>

<script>
const API='https://script.google.com/macros/s/AKfycbzNRsp18lbCt5rJrDFXHCZWCwRvBepq39lP-rmURbHxxWM0qwnFvXAnWp3V9eUZJX0y/exec';
const U=JSON.parse(sessionStorage.getItem('mikan_user')||'null');
if(!U||U.role!=='admin')window.location.href='index.html';
else document.getElementById('adminName').textContent=U.name;
const $=id=>document.getElementById(id);
const toast=(m,t='')=>{const e=$('toast');e.textContent=m;e.className=`toast ${t} show`;setTimeout(()=>e.classList.remove('show'),3000)};
const HT={Annual:'Vacation',Personal:'Personal',Medical:'Sick Leave',MedAppt:'Med. Visit'};
async function api(d){return(await fetch(API,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(d)})).json();}
function logout(){sessionStorage.removeItem('mikan_user');window.location.href='index.html';}

const S={sec:'hours',yr:new Date().getFullYear(),mo:new Date().getMonth()+1,emps:[],dash:[],pending:[],closures:[],paidHrs:[],loaded:false,mk:'',search:'',selEmp:null,calDate:null,empPunched:{}};

async function loadAll(f){const k=`${S.yr}-${S.mo}`;if(S.loaded&&S.mk===k&&!f)return;try{const r=await api({action:'adminInit',year:String(S.yr),month:String(S.mo)});if(r.success){S.dash=r.dashboard;S.emps=r.employees;S.pending=r.pendingRequests;S.approvedHols=r.approvedHolidays||[];S.closures=r.closures;S.loaded=true;S.mk=k;updBadge();}}catch(e){toast('Error loading','error');}}
function updBadge(){const b=$('pendingBadge'),c=S.pending.length;if(c>0){b.textContent=c;b.style.display='inline';}else b.style.display='none';}

function showSection(s){S.sec=s;document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));$(`nav${s.charAt(0).toUpperCase()+s.slice(1)}`).classList.add('active');$('sidebar').classList.remove('open');render();}
function render(){const m=$('mainContent');({hours:renderHours,timeoff:renderTimeoff,archive:renderArchive})[S.sec](m);}
function openModal(t,h,lg){$('mTitle').textContent=t;$('mBody').innerHTML=h;$('modal').className=lg?'modal modal-lg':'modal';$('modalBg').classList.add('active');}
function closeModal(){$('modalBg').classList.remove('active');}

function mSel(){const d=new Date(S.yr,S.mo-1),n=new Date(),c=S.yr===n.getFullYear()&&S.mo===n.getMonth()+1;return`<div class="month-sel"><button class="month-btn" onclick="chgMo(-1)">‹</button><div class="month-lbl">${d.toLocaleDateString('en-US',{month:'long',year:'numeric'})}${c?'<span class="month-cur">NOW</span>':''}</div><button class="month-btn" onclick="chgMo(1)" ${c?'disabled':''}>›</button></div>`;}
async function chgMo(d){const n=new Date();if(d>0&&S.yr===n.getFullYear()&&S.mo===n.getMonth()+1)return;S.mo+=d;if(S.mo<1){S.mo=12;S.yr--;}else if(S.mo>12){S.mo=1;S.yr++;}
  // Update month selector immediately, show spinner only in table
  const mDisp=document.querySelector('.month-lbl');if(mDisp){const nd=new Date(S.yr,S.mo-1),nc=new Date(),ic=S.yr===nc.getFullYear()&&S.mo===nc.getMonth()+1;mDisp.innerHTML=nd.toLocaleDateString('en-US',{month:'long',year:'numeric'})+(ic?'<span class="month-cur">NOW</span>':'');}
  const nextBtn=document.querySelector('.month-btn:last-child');if(nextBtn){const nc=new Date();nextBtn.disabled=S.yr===nc.getFullYear()&&S.mo===nc.getMonth()+1;}
  // Show spinner only in the table body, keep rest of page intact
  const empTab=$('empTab');if(empTab){const tbody=empTab.querySelector('tbody');if(tbody)tbody.innerHTML=`<tr><td colspan="5" style="text-align:center;padding:20px"><div class="spinner" style="margin:0 auto;width:28px;height:28px"></div></td></tr>`;}
  await loadAll(true);
  // Just re-render the table and stats, not the whole page
  renderEmpTable();
  // Update stats cards
  const r=S.dash,te=r.length,th=S.viewMode==='weekly'?0:r.reduce((s,e)=>s+e.monthHours,0),ah=te?th/te:0;
  const cards=document.querySelectorAll('.stat-card .stat-value');
  if(cards.length>=4){cards[0].textContent=te;cards[1].textContent=th.toFixed(1)+'h';cards[2].textContent=ah.toFixed(1)+'h';cards[3].textContent=S.pending.length;}
}
async function refresh(){$('mainContent').innerHTML='<div class="loading"><div class="spinner"></div><p>Refreshing...</p></div>';await loadAll(true);render();}
</script>

<script>
// ===== HOURS SECTION =====
if(!S.viewMode)S.viewMode='monthly';
if(!S.weekOff)S.weekOff=0;

function renderHours(m){
  const r=S.dash,te=r.length;
  // Calculate totals based on view mode
  let th,ah;
  if(S.viewMode==='weekly'){
    const w=getWeekRange(S.weekOff);const ws=w.start.toISOString().slice(0,10),we=w.end.toISOString().slice(0,10);
    th=r.reduce((s,e)=>{const dh=e.dailyHours||{};let wh=0;Object.entries(dh).forEach(([d,h])=>{if(d>=ws&&d<=we)wh+=h;});return s+wh;},0);
  }else{th=r.reduce((s,e)=>s+e.monthHours,0);}
  ah=te?th/te:0;
  let h=`<div class="page-header"><div><div class="page-title">📊 Employee Hours</div></div><div style="display:flex;gap:6px;flex-wrap:wrap"><button class="btn btn-primary" onclick="exportCSV()">📥 Export</button><button class="btn btn-primary" onclick="refresh()">🔄</button></div></div>`;
  h+=`<div class="stats-grid"><div class="stat-card"><div class="stat-icon">👥</div><div class="stat-value">${te}</div><div class="stat-label">Employees</div></div><div class="stat-card"><div class="stat-icon">⏱️</div><div class="stat-value">${th.toFixed(1)}h</div><div class="stat-label">Total Hours</div></div><div class="stat-card"><div class="stat-icon">📊</div><div class="stat-value">${ah.toFixed(1)}h</div><div class="stat-label">Avg Hours</div></div><div class="stat-card"><div class="stat-icon">📋</div><div class="stat-value">${S.pending.length}</div><div class="stat-label">Pending</div></div></div>`;
  // Tabs row with view toggle + date selector
  h+=`<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:14px">`;
  h+=`<div class="tabs" id="hrTabs" style="margin-bottom:0;flex:1"><button class="tab active" onclick="hrTab('empTab')">👥 Employees</button><button class="tab" onclick="hrTab('paidTab')">💰 Paid Hours</button><button class="tab" onclick="hrTab('freezeTab')">🔒 Freeze</button></div>`;
  h+=`<div style="display:flex;gap:6px;align-items:center">`;
  h+=`<div class="tabs" style="margin-bottom:0;padding:3px"><button class="tab ${S.viewMode==='monthly'?'active':''}" onclick="setView('monthly')" style="padding:6px 10px;font-size:11px">📅 Monthly</button><button class="tab ${S.viewMode==='weekly'?'active':''}" onclick="setView('weekly')" style="padding:6px 10px;font-size:11px">📆 Weekly</button></div>`;
  h+=S.viewMode==='monthly'?mSel():wSel();
  h+=`</div></div>`;
  h+=`<div id="empTab" class="tab-content active"></div><div id="paidTab" class="tab-content"></div><div id="freezeTab" class="tab-content"></div>`;
  m.innerHTML=h;
  renderEmpTable();renderPaidTab();renderFreezeTab();
}

function setView(v){S.viewMode=v;S.weekOff=0;render();}
function getWeekRange(off){const now=new Date();const d=new Date(now);d.setDate(d.getDate()-d.getDay()+1+(off*7));const start=new Date(d);const end=new Date(d);end.setDate(end.getDate()+6);return{start,end,label:start.toLocaleDateString('en-US',{month:'short',day:'numeric'})+' - '+end.toLocaleDateString('en-US',{month:'short',day:'numeric'})};}
function wSel(){const w=getWeekRange(S.weekOff);const isNow=S.weekOff===0;return`<div class="month-sel"><button class="month-btn" onclick="S.weekOff--;render()">‹</button><div class="month-lbl">${w.label}${isNow?'<span class="month-cur">NOW</span>':''}</div><button class="month-btn" onclick="S.weekOff++;render()" ${isNow?'disabled':''}>›</button></div>`;}

function hrTab(id){document.querySelectorAll('#hrTabs .tab').forEach((t,i)=>t.classList.toggle('active',['empTab','paidTab','freezeTab'][i]===id));['empTab','paidTab','freezeTab'].forEach(t=>{const el=$(t);if(el)el.classList.toggle('active',t===id);});}

function renderEmpTable(){
  const el=$('empTab');if(!el)return;
  // Calculate displayed hours based on view mode
  let displayData=S.dash;
  if(S.viewMode==='weekly'){
    const w=getWeekRange(S.weekOff);
    const ws=w.start.toISOString().slice(0,10),we=w.end.toISOString().slice(0,10);
    displayData=S.dash.map(e=>{
      const dh=e.dailyHours||{};
      let wHrs=0,wDays=0;
      Object.entries(dh).forEach(([d,h])=>{if(d>=ws&&d<=we){wHrs+=h;wDays++;}});
      return{...e,dispHours:Math.round(wHrs*100)/100,dispDays:wDays};
    });
  }else{
    displayData=S.dash.map(e=>({...e,dispHours:e.monthHours,dispDays:e.daysWorked}));
  }
  const filtered=displayData.filter(e=>!S.search||e.name.toLowerCase().includes(S.search));
  let h=`<div class="card"><div class="card-header"><div style="display:flex;align-items:center;gap:8px"><span class="card-title">👥 All Employees</span><button class="btn btn-add" onclick="addEmp()" style="padding:5px 12px;font-size:12px">➕ Add</button></div><input type="text" class="search-input" placeholder="🔍 Search..." value="${S.search||''}" oninput="S.search=this.value.toLowerCase();renderEmpTable()"></div><table><thead><tr><th>Employee</th><th>Role</th><th>Days</th><th>Hours</th><th style="width:40px"></th></tr></thead><tbody>`;
  filtered.forEach(e=>{const hrs=e.dispHours;const cls=S.viewMode==='weekly'?(hrs>=40?'good':hrs>=20?'warn':'bad'):(hrs>=150?'good':hrs>=100?'warn':'bad');h+=`<tr onclick="editEmp('${e.id}')" style="cursor:pointer"><td class="emp-name">${e.name}</td><td><span class="emp-role">${e.role}</span></td><td>${e.dispDays}</td><td><span class="badge badge-${cls}">${hrs.toFixed(1)}h</span></td><td><button class="btn-sm" onclick="event.stopPropagation();openEmpCal('${e.id}','${e.name}')" style="background:#3b82f6;color:#fff" title="Calendar">📅</button></td></tr>`;});
  h+='</tbody></table></div>';el.innerHTML=h;
}

function renderPaidTab(){const el=$('paidTab');if(!el)return;el.innerHTML=`<div class="card"><div class="card-header"><span class="card-title">💰 Paid Hours</span><button class="btn btn-add" onclick="addPaidHrs()">➕ Add</button></div><div class="card-body"><div class="empty"><div class="empty-icon">💰</div><p>No paid hours recorded yet</p></div></div></div>`;}
function renderFreezeTab(){const el=$('freezeTab');if(!el)return;el.innerHTML=`<div class="card"><div class="card-header"><span class="card-title">🔒 Freeze Punches</span></div><div class="card-body"><p style="color:var(--text-dim);font-size:13px">Freeze a date range to prevent employees from editing their punches.</p><div style="margin-top:12px"><button class="btn btn-danger" onclick="toast('Freeze feature coming soon','')">🔒 Freeze Current Month</button></div></div></div>`;}

function addPaidHrs(){openModal('➕ Add Paid Hours',`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div class="fg"><label class="fl">Employee</label><select id="phEmp" class="fs">${S.emps.map(e=>`<option value="${e.id}">${e.name}</option>`).join('')}</select></div><div class="fg"><label class="fl">Hours</label><input type="number" id="phHrs" class="fi" value="1" min="0.5" step="0.5"></div><div class="fg"><label class="fl">Date</label><input type="date" id="phDate" class="fi"></div><div class="fg"><label class="fl">Notes</label><input type="text" id="phNotes" class="fi" placeholder="Optional"></div></div><div class="btn-row"><button class="btn-cancel" onclick="closeModal()">Cancel</button><button class="btn-save" onclick="toast('Paid hours feature coming soon','')">➕ Add</button></div>`);}

// Employee Calendar Modal
async function openEmpCal(id,name){
  S.selEmp={id,name};S.calDate=new Date(S.yr,S.mo-1,1);
  openModal(`📅 ${name}`,'<div class="loading"><div class="spinner"></div></div>',true);
  await loadEmpCal();
}
async function loadEmpCal(){
  const y=S.calDate.getFullYear(),m=S.calDate.getMonth()+1;
  try{const r=await api({action:'getPunchedDays',employee:S.selEmp.id,year:String(y),month:String(m)});S.empPunched=r.success?r.days:{};}catch(e){S.empPunched={};}
  renderEmpCal();
}
function renderEmpCal(){
  const y=S.calDate.getFullYear(),m=S.calDate.getMonth(),first=new Date(y,m,1),last=new Date(y,m+1,0),start=first.getDay();
  const now=new Date(),isCur=y===now.getFullYear()&&m===now.getMonth();
  let h=`<div class="cal-nav"><button class="month-btn" onclick="calMo(-1)">‹</button><span class="cal-title">${S.calDate.toLocaleDateString('en-US',{month:'long',year:'numeric'})}</span><button class="month-btn" onclick="calMo(1)" ${isCur?'disabled':''}>›</button></div><div class="cal-grid">`;
  ['S','M','T','W','T','F','S'].forEach(d=>h+=`<div class="cal-hdr">${d}</div>`);
  for(let i=0;i<start;i++)h+='<div class="cal-cell empty"></div>';
  for(let d=1;d<=last.getDate();d++){
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const p=S.empPunched[ds];const has=p&&p.count>0;
    const isT=y===now.getFullYear()&&m===now.getMonth()&&d===now.getDate();    h+=`<div class="cal-cell${has?' has-data':''}${isT?' today':''}" onclick="openDayDetail('${ds}')"><div class="cal-day">${d}</div>${has?`<div class="cal-sub">${p.count} punches</div>`:''}</div>`;
  }
  h+='</div>';$('mBody').innerHTML=h;
}
function calMo(d){S.calDate.setMonth(S.calDate.getMonth()+d);loadEmpCal();}
// Parse date string as local (avoids UTC off-by-one)
function parseDateLocal(ds){const[y,m,d]=ds.split('-').map(Number);return new Date(y,m-1,d);}

async function openDayDetail(date){
  S.currentDayDate=date;
  $('mBody').innerHTML='<div class="loading"><div class="spinner"></div></div>';
  try{
    const r=await api({action:'getEmployeeDetail',employee:S.selEmp.id,year:String(S.yr),month:String(S.mo)});
    renderDayDetail(date,r.success?r.days:{}); 
  }catch(e){$('mBody').innerHTML='<p>Error loading</p>';}
}

function renderDayDetail(date,days){
  const punches=(days[date])||[];
  let mins=0;const sorted=[...punches].sort((a,b)=>a.time.localeCompare(b.time));
  for(let i=0;i<sorted.length-1;i+=2)if(sorted[i].punchType==='IN'&&sorted[i+1]?.punchType==='OUT'){const[ih,im]=sorted[i].time.split(':').map(Number),[oh,om]=sorted[i+1].time.split(':').map(Number);const d=(oh*60+om)-(ih*60+im);if(d>0)mins+=d;}
  const hrs=mins/60;const dt=parseDateLocal(date);
  let h=`<button class="btn btn-primary" onclick="loadEmpCal()" style="margin-bottom:12px;font-size:12px">← Calendar</button>`;
  h+=`<div class="day-hrs"><div class="day-hrs-val">${hrs.toFixed(2)}h</div><div class="day-hrs-lbl">${dt.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}</div></div>`;
  h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span style="font-weight:600;font-size:13px">Punches</span><button class="btn btn-add" onclick="adminAddPunch('${date}')" style="padding:4px 10px;font-size:11px">➕ Add</button></div>`;
  if(!punches.length)h+='<div class="empty"><div class="empty-icon">🕐</div><p>No punches</p></div>';
  else sorted.forEach(p=>{
    h+=`<div class="day-punch ${p.punchType.toLowerCase()}" id="adp-${p.punchId}" style="justify-content:space-between">
      <div style="display:flex;align-items:center;gap:10px"><span class="punch-type ${p.punchType.toLowerCase()}">${p.punchType}</span><span class="punch-time-lg" id="adpt-${p.punchId}">${p.time}</span></div>
      <div style="display:flex;gap:4px">
        <button class="btn-sm" onclick="adminEditPunch('${p.punchId}','${p.time}','${date}')" style="background:var(--accent-dark);color:#fff">✏️</button>
        <button class="btn-sm btn-danger" onclick="adminDelPunch('${p.punchId}','${date}')">🗑️</button>
      </div>
    </div>`;
  });
  $('mBody').innerHTML=h;
  S._dayDetailDays=days;
}

function adminAddPunch(date){
  const now=new Date();const t=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const html=`<div class="fg"><label class="fl">Time</label><input type="time" id="apTime" class="fi" value="${t}" style="font-size:22px;text-align:center;font-weight:700"></div><div class="btn-row"><button class="btn-cancel" onclick="openDayDetail('${date}')">Cancel</button><button class="btn-save" id="apSave" onclick="saveAdminPunch('${date}')">➕ Add Punch</button></div>`;
  $('mBody').innerHTML=`<button class="btn btn-primary" onclick="openDayDetail('${date}')" style="margin-bottom:12px;font-size:12px">← Back</button><div style="font-weight:600;margin-bottom:12px">${parseDateLocal(date).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}</div>${html}`;
}
async function saveAdminPunch(date){
  const time=$('apTime').value;if(!time)return toast('Select a time','error');
  const btn=$('apSave');btn.disabled=true;btn.textContent='⏳';
  try{const r=await api({action:'addPunch',employee:S.selEmp.id,name:S.selEmp.name,date,time});
  if(r.success){toast('Punch added','success');await openDayDetail(date);}else{toast(r.message,'error');btn.disabled=false;btn.textContent='➕ Add Punch';}}
  catch(e){toast('Error','error');btn.disabled=false;btn.textContent='➕ Add Punch';}
}

function adminEditPunch(id,time,date){
  const html=`<div class="fg"><label class="fl">Time</label><input type="time" id="epTime" class="fi" value="${time}" style="font-size:22px;text-align:center;font-weight:700"></div><div class="btn-row"><button class="btn-cancel" onclick="openDayDetail('${date}')">Cancel</button><button class="btn-save" id="epSave" onclick="saveAdminEdit('${id}','${date}')">💾 Save</button></div>`;
  $('mBody').innerHTML=`<button class="btn btn-primary" onclick="openDayDetail('${date}')" style="margin-bottom:12px;font-size:12px">← Back</button><div style="font-weight:600;margin-bottom:12px">Edit Punch</div>${html}`;
}
async function saveAdminEdit(id,date){
  const time=$('epTime').value;if(!time)return toast('Select a time','error');
  const btn=$('epSave');btn.disabled=true;btn.textContent='⏳';
  try{const r=await api({action:'editPunch',punchId:id,time,employee:S.selEmp.id});
  if(r.success){toast('Updated','success');await openDayDetail(date);}else{toast(r.message,'error');btn.disabled=false;btn.textContent='💾 Save';}}
  catch(e){toast('Error','error');btn.disabled=false;btn.textContent='💾 Save';}
}async function adminDelPunch(id,date){
  if(!confirm('Delete this punch?'))return;
  const el=document.getElementById(`adp-${id}`);if(el)el.style.opacity='0.4';
  try{const r=await api({action:'deletePunch',punchId:id,employee:S.selEmp.id});
  if(r.success){toast('Deleted','success');await openDayDetail(date);}else{toast(r.message,'error');if(el)el.style.opacity='1';}}
  catch(e){toast('Error','error');if(el)el.style.opacity='1';}
}

function exportCSV(){let csv='Name,Role,Days Worked,Hours\n';S.dash.forEach(e=>{csv+=`"${e.name}","${e.role}",${e.daysWorked},${e.monthHours.toFixed(2)}\n`;});const blob=new Blob([csv],{type:'text/csv'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`MIKAN_${S.yr}-${String(S.mo).padStart(2,'0')}.csv`;a.click();URL.revokeObjectURL(url);toast('Exported','success');}
</script>

<script>
// ===== TIME OFF SECTION =====
function renderTimeoff(m){
  let h=`<div class="page-header"><div><div class="page-title">🏖️ Time Off</div></div><button class="btn btn-primary" onclick="refresh()">🔄 Refresh</button></div>`;
  h+=`<div class="tabs" id="toTabs"><button class="tab active" onclick="toTab('reqTab')">📋 Requests <span class="tab-badge" id="reqBadge">${S.pending.length||''}</span></button><button class="tab" onclick="toTab('ovTab')">📊 Overview</button><button class="tab" onclick="toTab('calTab')">📅 Calendar</button><button class="tab" onclick="toTab('cloTab')">🗓️ Closures</button></div>`;
  h+=`<div id="reqTab" class="tab-content active"></div><div id="ovTab" class="tab-content"></div><div id="calTab" class="tab-content"></div><div id="cloTab" class="tab-content"></div>`;
  m.innerHTML=h;renderReqTab();renderOvTab();renderCalTab();renderCloTab();
}
function toTab(id){const tabs=['reqTab','ovTab','calTab','cloTab'];document.querySelectorAll('#toTabs .tab').forEach((t,i)=>t.classList.toggle('active',tabs[i]===id));tabs.forEach(t=>{const el=$(t);if(el)el.classList.toggle('active',t===id);});}

function renderReqTab(){
  const el=$('reqTab');if(!el)return;
  const pc=S.pending.length, ac=(S.approvedHols||[]).length;
  let h=`<div class="tabs" id="reqSubTabs" style="margin-bottom:12px"><button class="tab active" onclick="reqSub('reqPending')">⏳ Pending${pc?` <span class="tab-badge">${pc}</span>`:''}</button><button class="tab" onclick="reqSub('reqApproved')">✅ Approved${ac?` <span class="tab-badge" style="background:var(--success)">${ac}</span>`:''}</button></div>`;
  h+=`<div id="reqPending" class="tab-content active"></div><div id="reqApproved" class="tab-content"></div>`;
  el.innerHTML=h;
  // Pending
  const pEl=$('reqPending');
  if(!S.pending.length)pEl.innerHTML='<div class="card"><div class="card-body"><div class="empty"><div class="empty-icon">✅</div><p>No pending requests</p></div></div></div>';
  else{let t=`<div class="card"><table><thead><tr><th>Employee</th><th>Type</th><th>Dates</th><th>Days</th><th>Reason</th><th>Actions</th></tr></thead><tbody>`;S.pending.forEach(r=>{t+=`<tr><td class="emp-name">${r.employeeName}</td><td><span class="badge badge-${r.type.toLowerCase()}">${HT[r.type]||r.type}</span></td><td>${new Date(r.startDate).toLocaleDateString('en-US',{month:'short',day:'numeric'})}${r.startDate!==r.endDate?' - '+new Date(r.endDate).toLocaleDateString('en-US',{month:'short',day:'numeric'}):''}</td><td>${r.days}</td><td style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.reason||'-'}</td><td style="white-space:nowrap"><button class="btn-sm" onclick="actReq('${r.requestId}','approve')" style="background:var(--success);color:#fff;font-size:13px;padding:5px 10px">Approve</button> <button class="btn-sm" onclick="actReq('${r.requestId}','reject')" style="background:var(--danger);color:#fff;font-size:13px;padding:5px 10px">Reject</button></td></tr>`;});t+='</tbody></table></div>';pEl.innerHTML=t;}
  // Approved
  const aEl=$('reqApproved');const approved=S.approvedHols||[];
  if(!approved.length)aEl.innerHTML='<div class="card"><div class="card-body"><div class="empty"><div class="empty-icon">📋</div><p>No approved requests</p></div></div></div>';
  else{let t=`<div class="card"><table><thead><tr><th>Employee</th><th>Type</th><th>Dates</th><th>Days</th><th>Reason</th><th></th></tr></thead><tbody>`;approved.forEach(r=>{t+=`<tr><td class="emp-name">${r.employeeName}</td><td><span class="badge badge-${r.type.toLowerCase()}">${HT[r.type]||r.type}</span></td><td>${new Date(r.startDate).toLocaleDateString('en-US',{month:'short',day:'numeric'})}${r.startDate!==r.endDate?' - '+new Date(r.endDate).toLocaleDateString('en-US',{month:'short',day:'numeric'}):''}</td><td>${r.days}</td><td style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.reason||'-'}</td><td><button class="btn-sm" onclick="actReq('${r.requestId}','reject')" style="background:var(--danger);color:#fff;font-size:12px;padding:4px 8px">Cancel</button></td></tr>`;});t+='</tbody></table></div>';aEl.innerHTML=t;}
}
function reqSub(id){const tabs=['reqPending','reqApproved'];document.querySelectorAll('#reqSubTabs .tab').forEach((t,i)=>t.classList.toggle('active',tabs[i]===id));tabs.forEach(t=>{const el=$(t);if(el)el.classList.toggle('active',t===id);});}

function renderOvTab(){
  const el=$('ovTab');if(!el)return;
  const all=S.approvedHols||[];
  const rows=S.emps.filter(e=>e.status==='Active').map(e=>{
    const my=all.filter(h=>h.employeeId===e.id);
    const vac=my.filter(h=>h.type==='Annual').reduce((s,h)=>s+h.days,0);
    const per=my.filter(h=>h.type==='Personal').reduce((s,h)=>s+h.days,0);
    const sick=my.filter(h=>h.type==='Medical').reduce((s,h)=>s+h.days,0);
    const med=my.filter(h=>h.type==='MedAppt').reduce((s,h)=>s+h.days,0);
    return `<tr><td class="emp-name">${e.name}</td><td>${vac}/${e.annualDays}</td><td>${per}/${e.personalDays}</td><td>${sick}</td><td>${med}h/${e.medicalHours||20}h</td></tr>`;
  }).join('');
  el.innerHTML=`<div class="card"><div class="card-header"><span class="card-title">📊 Holiday Overview</span></div><table><thead><tr><th>Employee</th><th>Vacation</th><th>Personal</th><th>Sick</th><th>Med. Visit</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

function renderCalTab(){
  const el=$('calTab');if(!el)return;
  if(!S.calViewDate)S.calViewDate=new Date();
  const y=S.calViewDate.getFullYear(),m=S.calViewDate.getMonth(),first=new Date(y,m,1),last=new Date(y,m+1,0),start=first.getDay();
  const now=new Date(),isCur=y===now.getFullYear()&&m===now.getMonth();

  // Build closure map for this month
  const cloMap={};
  S.closures.forEach(c=>{const s=new Date(c.startDate),e=new Date(c.endDate);for(let d=new Date(s);d<=e;d.setDate(d.getDate()+1)){const ds=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;cloMap[ds]=c.name;}});

  // Build approved holidays map: date -> [{name, type}]
  const holMap={};
  S.pending.concat(S.approvedHols||[]).forEach(r=>{
    if(r.status!=='Approved'&&r.status!=='Pending')return;
    const s=new Date(r.startDate),e=new Date(r.endDate);
    for(let d=new Date(s);d<=e;d.setDate(d.getDate()+1)){
      const ds=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      if(!holMap[ds])holMap[ds]=[];
      holMap[ds].push({name:r.employeeName,type:r.type,status:r.status});
    }
  });

  let h=`<div class="card"><div class="card-body">`;
  h+=`<div class="cal-nav"><button class="month-btn" onclick="calViewMo(-1)">‹</button><span class="cal-title">${S.calViewDate.toLocaleDateString('en-US',{month:'long',year:'numeric'})}</span><button class="month-btn" onclick="calViewMo(1)" ${isCur?'disabled':''}>›</button></div>`;
  h+=`<div class="cal-grid">`;
  ['S','M','T','W','T','F','S'].forEach(d=>h+=`<div class="cal-hdr">${d}</div>`);
  for(let i=0;i<start;i++)h+='<div class="cal-cell empty"></div>';
  for(let d=1;d<=last.getDate();d++){
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const clo=cloMap[ds];const hols=holMap[ds]||[];
    const isT=y===now.getFullYear()&&m===now.getMonth()&&d===now.getDate();
    const hasData=clo||hols.length>0;
    let cls='cal-cell';if(hasData)cls+=' has-data';if(isT)cls+=' today';if(clo)cls+=' closure';
    h+=`<div class="${cls}" style="align-items:flex-start;padding:4px;${clo?'background:#fef3c7;border-color:#fde68a':''}">`;
    h+=`<div class="cal-day" style="font-size:11px">${d}</div>`;
    if(clo)h+=`<div style="font-size:7px;color:#92400e;font-weight:600;line-height:1.1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%">${clo}</div>`;
    hols.slice(0,2).forEach(ho=>{
      const colors={Annual:'#1e40af',Personal:'#5b21b6',Medical:'#991b1b',MedAppt:'#92400e'};
      const bgs={Annual:'#dbeafe',Personal:'#ede9fe',Medical:'#fee2e2',MedAppt:'#fef3c7'};
      h+=`<div style="font-size:7px;padding:1px 3px;border-radius:3px;background:${bgs[ho.type]||'#e5e7eb'};color:${colors[ho.type]||'#374151'};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%;margin-top:1px;opacity:${ho.status==='Pending'?'0.6':'1'}">${ho.name.split(' ')[0]}</div>`;
    });
    if(hols.length>2)h+=`<div style="font-size:7px;color:var(--text-dim)">+${hols.length-2} more</div>`;
    h+=`</div>`;
  }
  h+=`</div></div></div>`;
  el.innerHTML=h;
}
function calViewMo(d){if(!S.calViewDate)S.calViewDate=new Date();const n=new Date();if(d>0&&S.calViewDate.getFullYear()===n.getFullYear()&&S.calViewDate.getMonth()===n.getMonth())return;S.calViewDate.setMonth(S.calViewDate.getMonth()+d);renderCalTab();}

function renderCloTab(){
  const el=$('cloTab');if(!el)return;
  let h=`<div class="card"><div class="card-header"><span class="card-title">🗓️ Closures & Holidays</span><button class="btn btn-add" onclick="addClo()">➕ Add</button></div><div class="card-body">`;
  if(!S.closures.length)h+='<div class="empty"><div class="empty-icon">📅</div><p>No closures</p></div>';
  else S.closures.forEach(c=>{h+=`<div class="closure-item"><div><div class="closure-name">${c.name}</div><div class="closure-dates">${new Date(c.startDate).toLocaleDateString('en-US',{month:'short',day:'numeric'})} - ${new Date(c.endDate).toLocaleDateString('en-US',{month:'short',day:'numeric'})}</div></div><button class="closure-del" onclick="delClo('${c.closureId}')">🗑️</button></div>`;});
  h+='</div></div>';el.innerHTML=h;
}

// ===== ARCHIVE SECTION =====
function renderArchive(m){
  m.innerHTML=`<div class="page-header"><div><div class="page-title">📦 Annual Archive</div><div class="page-subtitle">Archive past year data</div></div></div><div class="card"><div class="card-body"><p style="color:var(--text-dim);font-size:13px;margin-bottom:12px">Move punches and time off requests from a past year to archive sheets.</p><div class="fg"><label class="fl">Year to Archive</label><select id="archYr" class="fs"><option value="${new Date().getFullYear()-1}">${new Date().getFullYear()-1}</option></select></div><div style="background:#fef3c7;border-left:3px solid var(--warning);padding:10px 12px;border-radius:0 8px 8px 0;margin:12px 0;font-size:12px;color:#92400e"><strong>⚠️ Backup first.</strong> Data will be moved to archive sheets.</div><button class="btn btn-primary" onclick="toast('Archive feature coming soon','')">📦 Archive Year</button></div></div>`;
}

// ===== EMPLOYEE MANAGEMENT =====
function addEmp(){openModal('➕ Add Employee',`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div class="fg"><label class="fl">Name *</label><input type="text" id="nN" class="fi" placeholder="JOHN"></div><div class="fg"><label class="fl">PIN</label><input type="text" id="nP" class="fi" placeholder="Auto" maxlength="4"></div><div class="fg"><label class="fl">Role</label><select id="nR" class="fs"><option value="employee">Employee</option><option value="admin">Admin</option></select></div><div class="fg"><label class="fl">Annual Hours</label><input type="number" id="nH" class="fi" value="1776"></div><div class="fg"><label class="fl">Vacation</label><input type="number" id="nA" class="fi" value="30"></div><div class="fg"><label class="fl">Personal</label><input type="number" id="nPD" class="fi" value="2"></div></div><div class="btn-row"><button class="btn-cancel" onclick="closeModal()">Cancel</button><button class="btn-save" onclick="saveAdd()">➕ Add</button></div>`);}
async function saveAdd(){const n=$('nN').value.trim();if(!n)return toast('Name required','error');const btn=document.querySelector('#mBody .btn-save');btn.disabled=true;btn.textContent='⏳';try{const r=await api({action:'addEmployee',name:n,pin:$('nP').value||'',role:$('nR').value,annualDays:$('nA').value,personalDays:$('nPD').value,expectedHours:$('nH').value});if(r.success){
  // Add to local state immediately
  const newEmp={id:r.id,name:n.toUpperCase(),pin:r.pin||$('nP').value,role:$('nR').value,status:'Active',annualDays:Number($('nA').value),personalDays:Number($('nPD').value),expectedHours:Number($('nH').value),medicalHours:20};
  S.emps.push(newEmp);S.dash.push({...newEmp,monthHours:0,daysWorked:0,dailyHours:{}});
  toast(r.message,'success');closeModal();renderEmpTable();
}else{toast(r.message,'error');btn.disabled=false;btn.textContent='➕ Add';}}catch(e){toast('Error','error');btn.disabled=false;btn.textContent='➕ Add';}}

function editEmp(id){const e=S.emps.find(x=>x.id===id);if(!e)return;openModal('✏️ Edit Employee',`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div class="fg"><label class="fl">Name</label><input type="text" id="eN" class="fi" value="${e.name}"></div><div class="fg"><label class="fl">PIN</label><input type="text" id="eP" class="fi" value="${e.pin}" maxlength="4"></div><div class="fg"><label class="fl">Role</label><select id="eR" class="fs"><option value="employee" ${e.role==='employee'?'selected':''}>Employee</option><option value="admin" ${e.role==='admin'?'selected':''}>Admin</option></select></div><div class="fg"><label class="fl">Status</label><select id="eS" class="fs"><option value="Active" ${e.status==='Active'?'selected':''}>Active</option><option value="Inactive" ${e.status==='Inactive'?'selected':''}>Inactive</option></select></div><div class="fg"><label class="fl">Vacation</label><input type="number" id="eA" class="fi" value="${e.annualDays}"></div><div class="fg"><label class="fl">Personal</label><input type="number" id="ePD" class="fi" value="${e.personalDays}"></div><div class="fg"><label class="fl">Annual Hours</label><input type="number" id="eH" class="fi" value="${e.expectedHours}"></div><div class="fg"><label class="fl">Medical Hours</label><input type="number" id="eMH" class="fi" value="${e.medicalHours||20}"></div></div><div class="btn-row"><button class="btn-cancel" onclick="closeModal()">Cancel</button><button class="btn-save" onclick="saveEdit('${id}')">💾 Save</button></div>`);}
async function saveEdit(id){const btn=document.querySelector('#mBody .btn-save');btn.disabled=true;btn.textContent='⏳';try{const r=await api({action:'editEmployee',id,name:$('eN').value,pin:$('eP').value,role:$('eR').value,status:$('eS').value,annualDays:$('eA').value,personalDays:$('ePD').value,expectedHours:$('eH').value,medicalHours:$('eMH').value});if(r.success){
  // Update state locally
  const i=S.emps.findIndex(x=>x.id===id);if(i>-1){S.emps[i]={...S.emps[i],name:$('eN').value.toUpperCase(),pin:$('eP').value,role:$('eR').value,status:$('eS').value,annualDays:Number($('eA').value),personalDays:Number($('ePD').value),expectedHours:Number($('eH').value),medicalHours:Number($('eMH').value)};}
  const di=S.dash.findIndex(x=>x.id===id);if(di>-1){S.dash[di]={...S.dash[di],name:$('eN').value.toUpperCase(),role:$('eR').value};}
  toast('Updated','success');closeModal();renderEmpTable();
}else{toast(r.message,'error');btn.disabled=false;btn.textContent='💾 Save';}}catch(e){toast('Error','error');btn.disabled=false;btn.textContent='💾 Save';}}
async function delEmp(id,n){if(!confirm(`Delete ${n}?`))return;const btn=event.target;btn.disabled=true;btn.textContent='⏳';try{const r=await api({action:'deleteEmployee',employee:id});if(r.success){toast('Deleted','success');await loadAll(true);render();}else{toast(r.message,'error');btn.disabled=false;btn.textContent='🗑️';}}catch(e){toast('Error','error');btn.disabled=false;btn.textContent='🗑️';}}

// ===== TIME OFF ACTIONS =====
async function actReq(id,a){const btn=event.target;const orig=btn.textContent;btn.disabled=true;btn.textContent='⏳';try{const r=await api({action:a==='approve'?'approveHoliday':'rejectHoliday',requestId:id});if(r.success){toast(a==='approve'?'Request approved':'Request cancelled','success');await loadAll(true);render();}else{toast(r.message,'error');btn.disabled=false;btn.textContent=orig;}}catch(e){toast('Error','error');btn.disabled=false;btn.textContent=orig;}}
function addClo(){openModal('➕ Add Closure',`<div class="fg"><label class="fl">Name</label><input type="text" id="cN" class="fi" placeholder="e.g., New Year's Day"></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div class="fg"><label class="fl">Start</label><input type="date" id="cS" class="fi"></div><div class="fg"><label class="fl">End</label><input type="date" id="cE" class="fi"></div></div><div class="btn-row"><button class="btn-cancel" onclick="closeModal()">Cancel</button><button class="btn-save" onclick="saveClo()">➕ Add</button></div>`);}
async function saveClo(){const n=$('cN').value,s=$('cS').value,e=$('cE').value;if(!n||!s||!e)return toast('All fields required','error');const btn=document.querySelector('#mBody .btn-save');btn.disabled=true;btn.textContent='⏳';try{const r=await api({action:'addClosure',name:n,startDate:s,endDate:e});if(r.success){toast('Added','success');closeModal();await loadAll(true);render();}else{toast(r.message,'error');btn.disabled=false;btn.textContent='➕ Add';}}catch(e){toast('Error','error');btn.disabled=false;btn.textContent='➕ Add';}}
async function delClo(id){if(!confirm('Delete?'))return;const btn=event.target;btn.disabled=true;btn.textContent='⏳';try{const r=await api({action:'deleteClosure',closureId:id});if(r.success){toast('Deleted','success');await loadAll(true);render();}else{toast(r.message,'error');btn.disabled=false;btn.textContent='🗑️';}}catch(e){toast('Error','error');btn.disabled=false;btn.textContent='🗑️';}}

// ===== INIT =====
window.onload=async()=>{if(!U)return;$('mainContent').innerHTML='<div class="loading"><div class="spinner"></div><p>Loading...</p></div>';await loadAll();render();};
</script>
