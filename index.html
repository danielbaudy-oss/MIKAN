<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MIKAN">
  <meta name="theme-color" content="#e9b595">
  <title>MIKAN - Clock In</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f1dfd3;--accent:#e9b595;--accent-dark:#d4956e;--text:#1a1a1a;--text-dim:#6b5c52;--radius:14px}
html,body{height:100%;width:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{background:#fff;border-radius:24px;padding:40px 30px;width:100%;max-width:360px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,0.08)}
.logo{margin-bottom:8px}
.logo img{width:80px;height:80px;object-fit:contain}
.brand{font-size:32px;font-weight:800;color:var(--text);letter-spacing:4px;margin-bottom:4px}
.subtitle{color:var(--text-dim);font-size:13px;margin-bottom:36px}
.pin-label{color:var(--text-dim);font-size:12px;text-transform:uppercase;letter-spacing:2px;margin-bottom:16px;font-weight:600}
.pin-dots{display:flex;justify-content:center;gap:14px;margin-bottom:30px}
.pin-dot{width:18px;height:18px;border-radius:50%;border:2px solid #d4c4b8;transition:all .2s}
.pin-dot.filled{background:var(--accent-dark);border-color:var(--accent-dark);box-shadow:0 0 12px rgba(212,149,110,0.4)}
.pin-dot.error{background:#ef4444;border-color:#ef4444;animation:shake .4s}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:280px;margin:0 auto}
.num-btn{height:64px;border:none;border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:24px;font-weight:600;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
.num-btn:hover{background:var(--accent)}
.num-btn:active{transform:scale(0.95);background:var(--accent-dark);color:#fff}
.num-btn.action{background:transparent;font-size:18px;color:var(--text-dim)}
.num-btn.action:hover{color:var(--text)}
.num-btn.action:active{background:var(--bg)}
.error-msg{color:#ef4444;font-size:13px;margin-top:20px;min-height:20px;font-weight:600}
.loading-spinner{width:24px;height:24px;border:3px solid #d4c4b8;border-top-color:var(--accent-dark);border-radius:50%;animation:spin .6s linear infinite;margin:20px auto 0}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
</style>
</head>
<body>
  <div class="login-card">
    <div class="logo"><img src="logo.png" alt="MIKAN"></div>
    <div class="brand">MIKAN</div>
    <div class="subtitle">Employee Time Clock</div>
    <div class="pin-label">Enter your PIN</div>
    <div class="pin-dots" id="pinDots">
      <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
    </div>
    <div class="numpad" id="numpad">
      <button class="num-btn" onclick="addDigit('1')">1</button>
      <button class="num-btn" onclick="addDigit('2')">2</button>
      <button class="num-btn" onclick="addDigit('3')">3</button>
      <button class="num-btn" onclick="addDigit('4')">4</button>
      <button class="num-btn" onclick="addDigit('5')">5</button>
      <button class="num-btn" onclick="addDigit('6')">6</button>
      <button class="num-btn" onclick="addDigit('7')">7</button>
      <button class="num-btn" onclick="addDigit('8')">8</button>
      <button class="num-btn" onclick="addDigit('9')">9</button>
      <button class="num-btn action" onclick="clearPin()">✕</button>
      <button class="num-btn" onclick="addDigit('0')">0</button>
      <button class="num-btn action" onclick="backspace()">⌫</button>
    </div>
    <div class="error-msg" id="errorMsg"></div>
  </div>

<script>
// Supabase config
const SB_URL = 'https://kxbmlsbxnzvgzucxleoy.supabase.co';
const SB_KEY = 'sb_publishable_qLmpXx5qeCO0cIdNqDMzeQ_HnLH4VS_';
const SB_HDR = { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` };

let pin = '';
let isLoading = false;

function addDigit(d) {
  if (isLoading || pin.length >= 4) return;
  pin += d;
  updateDots();
  if (pin.length === 4) doLogin();
}

function backspace() {
  if (isLoading) return;
  pin = pin.slice(0, -1);
  updateDots();
  document.getElementById('errorMsg').textContent = '';
}

function clearPin() {
  if (isLoading) return;
  pin = '';
  updateDots();
  document.getElementById('errorMsg').textContent = '';
}

function updateDots() {
  const dots = document.querySelectorAll('.pin-dot');
  dots.forEach((dot, i) => {
    dot.classList.toggle('filled', i < pin.length);
    dot.classList.remove('error');
  });
}

async function doLogin() {
  isLoading = true;
  document.getElementById('errorMsg').innerHTML = '<div class="loading-spinner"></div>';
  
  try {
    const res = await fetch(`${SB_URL}/rest/v1/employees?pin=eq.${pin}&status=eq.Active&select=id,name,role,pin`, { headers: SB_HDR });
    const rows = await res.json();
    
    if (rows.length) {
      sessionStorage.setItem('mikan_user', JSON.stringify(rows[0]));
      if (rows[0].role === 'admin') window.location.href = 'admin.html';
      else window.location.href = 'employee.html';
    } else {
      showError('Invalid PIN');
    }
  } catch (err) {
    showError('Connection error. Try again.');
  }
  
  isLoading = false;
}

function showError(msg) {
  document.getElementById('errorMsg').textContent = msg;
  document.querySelectorAll('.pin-dot').forEach(d => d.classList.add('error'));
  setTimeout(() => { pin = ''; updateDots(); }, 600);
}

window.onload = () => {
  const user = sessionStorage.getItem('mikan_user');
  if (user) {
    const u = JSON.parse(user);
    if (u.role === 'admin') window.location.href = 'admin.html';
    else window.location.href = 'employee.html';
  }
};
</script>
</body>
</html>
